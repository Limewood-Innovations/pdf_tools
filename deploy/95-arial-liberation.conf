% --------------------------------------------------------------------------
% CIDFont mappings for pdf_tools (Ghostscript pdfwrite normalization).
% Maps common Western CID fonts to system TrueType files.
% Drop-in for /etc/ghostscript/cidfmap.d/, merged into the global
% /var/lib/ghostscript/fonts/cidfmap by `update-gsfontmap`.
%
% Without this file Ghostscript silently substitutes embedded Arial/Times
% subset fonts with DroidSansFallback, which breaks character rendering
% (most visibly: lowercase h/i go missing from extracted text).
%
% NOTE: Identity-H encoding requires the substitute font to share the
% original font's glyph indices. "Real" MS fonts (mscorefonts) do, while
% open-source metric-only clones (Liberation, Carlito) do NOT — they
% will render Western text but corrupt umlauts/€/Sonderzeichen.
% --------------------------------------------------------------------------

% --- Arial (real MS Arial via ttf-mscorefonts-installer) ---
/ArialMT             << /FileType /TrueType /Path (/usr/share/fonts/truetype/msttcorefonts/Arial.ttf)             /SubfontID 0 /CSI [(Identity) 0] >> ;
/Arial-BoldMT        << /FileType /TrueType /Path (/usr/share/fonts/truetype/msttcorefonts/Arial_Bold.ttf)        /SubfontID 0 /CSI [(Identity) 0] >> ;
/Arial-ItalicMT      << /FileType /TrueType /Path (/usr/share/fonts/truetype/msttcorefonts/Arial_Italic.ttf)      /SubfontID 0 /CSI [(Identity) 0] >> ;
/Arial-BoldItalicMT  << /FileType /TrueType /Path (/usr/share/fonts/truetype/msttcorefonts/Arial_Bold_Italic.ttf) /SubfontID 0 /CSI [(Identity) 0] >> ;
/Arial               /ArialMT ;
/Arial,Bold          /Arial-BoldMT ;
/Arial,Italic        /Arial-ItalicMT ;
/Arial,BoldItalic    /Arial-BoldItalicMT ;

% --- Times New Roman (real MS Times via ttf-mscorefonts-installer) ---
/TimesNewRomanPSMT             << /FileType /TrueType /Path (/usr/share/fonts/truetype/msttcorefonts/Times_New_Roman.ttf)             /SubfontID 0 /CSI [(Identity) 0] >> ;
/TimesNewRomanPS-BoldMT        << /FileType /TrueType /Path (/usr/share/fonts/truetype/msttcorefonts/Times_New_Roman_Bold.ttf)        /SubfontID 0 /CSI [(Identity) 0] >> ;
/TimesNewRomanPS-ItalicMT      << /FileType /TrueType /Path (/usr/share/fonts/truetype/msttcorefonts/Times_New_Roman_Italic.ttf)      /SubfontID 0 /CSI [(Identity) 0] >> ;
/TimesNewRomanPS-BoldItalicMT  << /FileType /TrueType /Path (/usr/share/fonts/truetype/msttcorefonts/Times_New_Roman_Bold_Italic.ttf) /SubfontID 0 /CSI [(Identity) 0] >> ;
/TimesNewRoman                 /TimesNewRomanPSMT ;
/TimesNewRoman,Bold            /TimesNewRomanPS-BoldMT ;
/TimesNewRoman,Italic          /TimesNewRomanPS-ItalicMT ;
/TimesNewRoman,BoldItalic      /TimesNewRomanPS-BoldItalicMT ;
/TimesNewRomanPS               /TimesNewRomanPSMT ;
/TimesNewRomanPS-Bold          /TimesNewRomanPS-BoldMT ;
/TimesNewRomanPS-Italic        /TimesNewRomanPS-ItalicMT ;
/TimesNewRomanPS-BoldItalic    /TimesNewRomanPS-BoldItalicMT ;

% --- Calibri (Carlito = metric-compat OSS clone — Sonderzeichen-Risiko!) ---
/Calibri              << /FileType /TrueType /Path (/usr/share/fonts/truetype/crosextra/Carlito-Regular.ttf)    /SubfontID 0 /CSI [(Identity) 0] >> ;
/Calibri-Bold         << /FileType /TrueType /Path (/usr/share/fonts/truetype/crosextra/Carlito-Bold.ttf)       /SubfontID 0 /CSI [(Identity) 0] >> ;
/Calibri-Italic       << /FileType /TrueType /Path (/usr/share/fonts/truetype/crosextra/Carlito-Italic.ttf)     /SubfontID 0 /CSI [(Identity) 0] >> ;
/Calibri-BoldItalic   << /FileType /TrueType /Path (/usr/share/fonts/truetype/crosextra/Carlito-BoldItalic.ttf) /SubfontID 0 /CSI [(Identity) 0] >> ;
/CalibriMT            /Calibri ;
/Calibri,Bold         /Calibri-Bold ;
/Calibri,Italic       /Calibri-Italic ;
/Calibri,BoldItalic   /Calibri-BoldItalic ;
